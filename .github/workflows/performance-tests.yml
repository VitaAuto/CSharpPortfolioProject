name: k6 Performance Tests

on:
  workflow_dispatch:

jobs:
  k6-performance-tests:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      VAULT_URI: ${{ secrets.VAULT_URI }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose -f docker-compose.performance.yml up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl http://localhost:5043/swagger/index.html > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to start..."
            sleep 2
          done

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build k6 with Allure output
        run: |
          go install go.k6.io/xk6/cmd/xk6@latest
          xk6 build v0.48.0 --output k6-allure --with github.com/szkiba/xk6-output-allure@latest

      - name: Wait for Vault to be ready
        run: |
          for i in {1..30}; do
            if curl --header "X-Vault-Token: $VAULT_TOKEN" $VAULT_URI/v1/secret/data/myapp | grep -q 'username'; then
              echo "Vault secret is ready!"
              break
            fi
            echo "Waiting for Vault secret to be available..."
            sleep 2
          done

      - name: Get credentials from Vault (pwsh)
        shell: pwsh
        run: |
          $CREDS = Invoke-RestMethod -Headers @{"X-Vault-Token" = "${{ env.VAULT_TOKEN }}"} -Uri "${{ env.VAULT_URI }}/v1/secret/data/myapp"
          "K6_USERNAME=$($CREDS.data.data.username)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "K6_PASSWORD=$($CREDS.data.data.password)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run k6 with Allure output
        run: ./k6-allure run --out allure=allure-results ApiAndUiProject/Tests/Performance/users-api-crud.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-allure-report
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report